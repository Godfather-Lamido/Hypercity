<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="./Style/app.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="logobox">
        <img
          src="./Assests/icons/image 2.svg"
          alt="hyperCity"
          class="hyperCityLogo"
        />
        <img src="./Assests/icons/logo.svg" alt="c-logo" class="clogo" />
      </div>

      <search class="searchBar">
        <input type="search" placeholder="Search" class="search-input" />
        <button type="submit">
          <img
            src="./Assests/icons/search-normal.svg"
            width="24px"
            alt="search-icon"
          />
        </button>
      </search>

      <ul class="navsection">
        <li class="loginBox">
          <img
            src="./Assests/icons/profile.svg"
            width="24px"
            alt="profile-icon"
          />
          <p>Login</p>
        </li>
        <li style="width: 2px; height: 20px; background: gray" />
        <li class="cartBox">
          <img
            src="./Assests/icons/shopping-cart.svg"
            width="24px"
            alt="cart-icon"
          />
          <p>Cart (0)</p>
        </li>
      </ul>
    </nav>

    <section class="hyper-section">
      <div class="category-layout">
        <div class="category-title">
          <img
            src="./Assests/icons/menu.svg"
            width="24px"
            style="cursor: pointer"
            alt="menu-icon"
          />
          <p>Shop by Category</p>
        </div>

        <div class="category-contents" id="categoryBox">
            
        </div>
      </div>

      <div class="hyper-content">
        <img src="./Assests/images/Frame 36.svg" alt="hypercity-img" />

        <div class="hyper-dets">
          <div class="hyper-info">
            <img src="./Assests/icons/truck-fast.svg" alt="delivery-icon" />

            <div class="hyper-order">
              <p>Home Delivery</p>
              <p style="color: #546881; font-family: Work Sans">
                Free Shipping On All Order
              </p>
            </div>
            <div style="width: 2px; height: 20px; background: #b2bbc6"></div>
          </div>

          <div class="hyper-info">
            <img src="./Assests/icons/call.svg" alt="delivery-icon" />
            <div class="hyper-order">
              <p>Online Support</p>
              <p style="color: #546881" font-family: Work Sans;>
                Technical online support 24/7
              </p>
            </div>
            <div style="width: 2px; height: 20px; background: #b2bbc6"></div>
          </div>

          <div class="hyper-info">
            <img src="./Assests/icons/card-tick.svg" alt="delivery-icon" />
            <div class="hyper-order">
              <p>Low Price</p>
              <p style="color: #546881; font-family: Work Sans">
                Enjoy low price every weekend
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
  <script src="./Controller/categorySection.js"></script>
  
</html>
